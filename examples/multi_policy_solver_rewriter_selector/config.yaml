# Multi-policy config — three cooperating policies on DAPO-math-17k.
#   Pipeline (N=num_parallel=4 per role): solver → rewriter (sees all N) →
#   selector (picks best, "Judgment: IDX").
#   Reward (RLVR): solver/rewriter scored directly; selector inherits its
#   picked rewriter's reward. Group shaping ×1.2 if mean selector reward > 0.5
#   else ×0.8; raw rewards kept if no selector parses (anti-train guard).
#   Each policy is its own Megatron actor + 1:1 sglang engine; buffer_mode=split
#   routes Sample.policy_name; n_samples_per_prompt = num_parallel = 4.
#
# Per-policy keys: name/role, hf_checkpoint, load/save, ref_load (opt),
#   buffer_mode, num_gpus_per_node, megatron_num_nodes, sglang_num_nodes,
#   megatron: (training), sglang: (engine). The policy name is reused as the
#   sglang server name. ray_num_gpus = max(Σmegatron, Σsglang) with --colocate,
#   else Σmegatron + Σsglang.

policies:

  # ─── solver ───────────────────────────────────────────────────────────────
  - name: solver
    role: actor

    hf_checkpoint: /root/Qwen3-0.6B
    # load: /ckpt/multi_policy_solver_rewriter_selector/qwen3-0.6b/solver
    save: /ckpt/multi_policy_solver_rewriter_selector/qwen3-0.6b/solver
    # ref_load: /ckpt/qwen3-0.6b/ref   # uncomment for KL ref

    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1


      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # RL-correctness defaults (zero dropout, fp32 reductions/softmax)
      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      # Chunk logits along T to bound forward peak; -1 disables.
      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 128
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 8192

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 4
      eps_clip: 0.2
      eps_clip_high: 0.28
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1
      # model_path defaults to top-level hf_checkpoint

      mem_fraction_static: 0.2
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 8192
      max_running_requests: 32
      log_level: info
      # Optional (uncomment to enable):
      # max_total_tokens: 1048576
      # enable_metrics: true
      # speculative_algorithm: null
      # speculative_num_steps: 0
      # speculative_eagle_topk: 0
      # speculative_num_draft_tokens: 0

      server_groups:
        - worker_type: regular          # regular | prefill | decode | placeholder | encoder
          num_gpus: 1

  # ─── rewriter ─────────────────────────────────────────────────────────────
  - name: rewriter
    role: actor

    hf_checkpoint: /root/Qwen3-0.6B
    # load: /ckpt/multi_policy_solver_rewriter_selector/qwen3-0.6b/rewriter
    save: /ckpt/multi_policy_solver_rewriter_selector/qwen3-0.6b/rewriter

    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # RL-correctness defaults (zero dropout, fp32 reductions/softmax)
      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      # Chunk logits along T to bound forward peak; -1 disables.
      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 128
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 8192

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 4
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1

      mem_fraction_static: 0.2
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 8192
      max_running_requests: 32
      log_level: info

      server_groups:
        - worker_type: regular
          num_gpus: 1

  # ─── selector ─────────────────────────────────────────────────────────────
  - name: selector
    role: actor

    hf_checkpoint: /root/Qwen3-0.6B
    # load: /ckpt/multi_policy_solver_rewriter_selector/qwen3-0.6b/selector
    save: /ckpt/multi_policy_solver_rewriter_selector/qwen3-0.6b/selector

    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # RL-correctness defaults (zero dropout, fp32 reductions/softmax)
      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      # Chunk logits along T to bound forward peak; -1 disables.
      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 128
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 8192

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 4     # N parallel selectors per problem (matches num_parallel)
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1

      mem_fraction_static: 0.2
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 8192
      max_running_requests: 32
      log_level: info

      server_groups:
        - worker_type: regular
          num_gpus: 1
