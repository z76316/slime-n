# 102 homogeneous exam-taking agents, colocate-friendly sizing.
#
# Per-trajectory advantage (3-channel: self/swarm/peer) is composed at
# rollout time in agent_system.py and stored as Sample.reward. The run
# script must pass --disable-rewards-normalization so slime does not
# re-normalize.
#
# Cluster sizing (with --colocate):
#   actor_gpus   = sum(megatron_num_nodes * num_gpus_per_node) = 102 × 1 × 1 = 102
#   rollout_gpus = sum(sglang_num_nodes   * num_gpus_per_node) = 102 × 1 × 1 = 102
#   total (colocate) = max(actor_gpus, rollout_gpus)           = 102
#
# Multi-node required: 102 GPUs. NUM_GPUS_PER_NODE must divide 102.
# Divisors of 102: 1, 2, 3, 6, 17, 34, 51, 102. Common cluster shapes:
#   - 17 nodes × 6 GPUs   (NUM_GPUS_PER_NODE=6, NUM_NODES=17)   ← default
#   - 34 nodes × 3 GPUs   (NUM_GPUS_PER_NODE=3, NUM_NODES=34)
#   - 51 nodes × 2 GPUs   (NUM_GPUS_PER_NODE=2, NUM_NODES=51)
# 8-GPU nodes do NOT divide 102 (102 % 8 = 6). For 8-GPU clusters, edit
# this file to N=96 (12×8) or N=104 (13×8) and update agent_system.py:
# N_AGENTS to match.
#
# Also bump N_AGENTS in agent_system.py to 102 before running.

# YAML anchors for the megatron/sglang sub-blocks keep the 102 policy
# entries DRY. All policies are byte-identical aside from name and save.

_megatron_defaults: &megatron_defaults
  megatron_to_hf_mode: bridge
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 1
  expert_tensor_parallel_size: 1

  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1

  attention_dropout: 0.0
  hidden_dropout: 0.0
  accumulate_allreduce_grads_in_fp32: true
  attention_softmax_in_fp32: true

  log_probs_chunk_size: 512

  micro_batch_size: 1
  global_batch_size: 64
  use_dynamic_batch_size: true
  max_tokens_per_gpu: 32768

  optimizer: adam
  lr: 1.0e-6
  lr_decay_style: constant
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.98
  optimizer_cpu_offload: true
  overlap_cpu_optimizer_d2h_h2d: true
  use_precision_aware_optimizer: true

  advantage_estimator: grpo
  n_samples_per_prompt: 8
  eps_clip: 0.2
  eps_clip_high: 0.28
  kl_coef: 0
  use_kl_loss: false
  kl_loss_coef: 0

_sglang_defaults: &sglang_defaults
  update_weights: true
  num_gpus_per_engine: 1
  mem_fraction_static: 0.3
  # cuda_graph_bs: [1, 2, 4, 8, 16, 32]
  chunked_prefill_size: 4096
  max_running_requests: 512
  log_level: info
  server_groups:
    - worker_type: regular
      num_gpus: 1

policies:

  - name: agent_0
    role: actor
    hf_checkpoint: /root/Qwen3-0.6B
    save: /ckpt/multi_policy_exam_swarm_rl/qwen3-0.6b/agent_0
    buffer_mode: split
    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1
    megatron: *megatron_defaults
    sglang: *sglang_defaults

  - name: agent_1
