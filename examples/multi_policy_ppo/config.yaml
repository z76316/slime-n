# Multi-policy PPO — asymmetric actor + critic.
#
# actor   : trainable, paired Megatron + SGLang, Qwen3-1.7B
# critic  : trainable, standalone Megatron (no engine), Qwen3-0.6B,
#           advantage_estimator=ppo → shape-derived role=critic
#
# Each policy declares its architecture via `megatron.model_args_path`,
# which points at an upstream `scripts/models/<name>.sh` `MODEL_ARGS=(...)`
# array. The parser loads each .sh per policy, so actor and critic can have
# independent arch — the thing legacy single-policy PPO (one global
# MODEL_ARGS) cannot express. See README.md for the runtime walkthrough.
#
# Cluster (no --colocate): 3 GPUs total
#   GPU 0: actor Megatron
#   GPU 1: critic Megatron
#   GPU 2: actor SGLang

policies:

  # ─── actor (Qwen3-1.7B) ─────────────────────────────────────────────────
  - name: actor
    role: actor
    trainable: true
    hf_checkpoint: /root/Qwen3-1.7B
    save: /ckpt/multi_policy_ppo/qwen3-1.7B/actor
    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      # Architecture comes from this .sh. Parser extracts MODEL_ARGS=(...),
      # converts kebab→snake (e.g. `--num-layers 28` → num_layers: 28),
      # and merges keys into the policy's args namespace UNDER any inline
      # overrides in this block.
      model_args_path: scripts/models/qwen3-1.7B.sh

      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 64
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 8192

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: ppo
      n_samples_per_prompt: 4
      eps_clip: 0.2
      eps_clip_high: 0.28
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1

      mem_fraction_static: 0.85
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 4096
      max_running_requests: 32
      max_total_tokens: 131072
      log_level: info

      server_groups:
        - worker_type: regular
          num_gpus: 1

  # ─── critic (Qwen3-0.6B) ────────────────────────────────────────────────
  # role: actor in YAML — placement_group.py flips role_eff="critic" via
  # is_critic_shape (trainable + sglang_num_nodes==0 + advantage_estimator
  # == "ppo"). YAML role is kept intact for logs/saves.
  - name: critic
    role: actor
    trainable: true
    hf_checkpoint: /root/Qwen3-0.6B
    save: /ckpt/multi_policy_ppo/qwen3-1.7B/critic
    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 0  # standalone — no engine

    megatron:
      # Different arch from the actor. This is the case legacy single-policy
      # PPO cannot express: one bash `source scripts/models/...sh` provides
      # one global MODEL_ARGS for the whole run, so actor and critic would
      # be stuck on the same arch.
      model_args_path: scripts/models/qwen3-0.6B.sh

      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 64
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 8192

      optimizer: adam
      lr: 5.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: ppo  # required for shape detection (is_critic_shape)
      n_samples_per_prompt: 4
      eps_clip: 0.2
