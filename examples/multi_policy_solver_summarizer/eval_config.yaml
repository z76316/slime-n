# Yaml form (not --eval-prompt-data) because rm_type must be set per
# dataset; --eval-prompt-data has no syntax for it.
# n_samples_per_eval_prompt=1 — rollout_with_multi_agents emits 4
# summarizer trajectories per prompt (solver samples filtered in eval
# mode). 30 prompts × 4 = 120 generations per eval; pass@4 on the
# summarizer phase.

eval:
  datasets:
    - name: aime
      path: /root/aime-2024/aime-2024.jsonl
      rm_type: deepscaler
      n_samples_per_eval_prompt: 1
