# Multi-policy multi-agent config — single source of truth.
#
# Task: three cooperating policies on math problems (DAPO-math-17k).
#   Pipeline (N=num_parallel=4 trajectories per role per prompt):
#     1. solver    — N parallel solvers each produce a candidate solution.
#     2. rewriter  — N parallel rewriters each see ALL N solver candidates and
#                    synthesize a refined solution (one per worker).
#     3. selector  — N parallel selectors each see ALL N rewriter candidates
#                    and emit "Judgment: IDX" picking one as best.
#
#   Reward (verifiable reward / RLVR scores correctness per role):
#     - solver/rewriter: direct correctness reward from the verifier.
#     - selector: inherits the reward of whichever rewriter candidate it picked.
#     - Group shaping: if mean parsed-selector reward > 0.5, all three roles'
#       rewards × correct_reward_weight (1.2); else × incorrect_reward_weight
#       (0.8). When every selector fails to parse, raw rewards are preserved
#       (anti-train guard — broken selector must not penalize correct upstream).
#
#   Each policy is its own Megatron actor paired 1:1 with its own sglang engine
#   (buffer_mode=split routes Sample.policy_name to the matching policy's
#   buffer; n_samples_per_prompt = num_parallel = 4 for GRPO group-norm).
#
# Each entry under `policies:`:
#   name, role                           — identity
#   hf_checkpoint                        — base model
#   load, save                           — checkpoint dirs (per-policy)
#   ref_load                             — KL ref checkpoint (optional)
#   buffer_mode                          — "split" | "shared". Routes Sample.policy_name.
#   num_gpus_per_node                    — per-policy GPU slice size on each side
#   megatron_num_nodes                   — Megatron actor placement (world_size = nodes × num_gpus_per_node)
#   sglang_num_nodes                     — sglang engine placement for this policy's 1:1 engine
#                                          (sglang_num_nodes × num_gpus_per_node must equal
#                                           sum(sglang.server_groups[].num_gpus))
#   megatron:                            — Megatron training (parallel, recompute, batching, optimizer, loss)
#   sglang:                              — sglang engine deployment (server args, server_groups)
#
# 1:1 pairing is implicit: each policy entry owns exactly one sglang block.
# The policy's `name` is reused as the sglang server name (used by get_model_url
# and Sample.policy_name).
#
# Cluster sizing (derivable from this file):
#   total_megatron_gpus = sum(policies[i].megatron_num_nodes * num_gpus_per_node)
#   total_sglang_gpus   = sum(policies[i].sglang_num_nodes   * num_gpus_per_node)
#   ray_num_gpus = max(total_megatron_gpus, total_sglang_gpus)  # with --colocate
#                = total_megatron_gpus + total_sglang_gpus       # without --colocate

policies:

  # ─── solver ───────────────────────────────────────────────────────────────
  - name: solver
    role: actor

    hf_checkpoint: /root/Qwen3-0.6B
    # load: /ckpt/multi_policy_multi_agent/qwen3-0.6b/solver
    save: /ckpt/multi_policy_multi_agent/qwen3-0.6b/solver
    # ref_load: /ckpt/qwen3-0.6b/ref   # uncomment for KL ref

    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1


      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # RL-correctness defaults (zero dropout, fp32 reductions/softmax)
      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      # Chunk the [T, V] logits along T to bound forward peak (152K vocab is
      # heavy on L40S). Set to -1 to disable.
      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 128
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 2048

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 4
      eps_clip: 0.2
      eps_clip_high: 0.28
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1
      # model_path defaults to top-level hf_checkpoint

      mem_fraction_static: 0.2
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 8192
      max_running_requests: 32
      log_level: info
      # Optional (uncomment to enable):
      # max_total_tokens: 1048576
      # enable_metrics: true
      # speculative_algorithm: null
      # speculative_num_steps: 0
      # speculative_eagle_topk: 0
      # speculative_num_draft_tokens: 0

      server_groups:
        - worker_type: regular          # regular | prefill | decode | placeholder | encoder
          num_gpus: 1

  # ─── rewriter ─────────────────────────────────────────────────────────────
  - name: rewriter
    role: actor

    hf_checkpoint: /root/Qwen3-0.6B
    # load: /ckpt/multi_policy_multi_agent/qwen3-0.6b/rewriter
    save: /ckpt/multi_policy_multi_agent/qwen3-0.6b/rewriter

    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # RL-correctness defaults (zero dropout, fp32 reductions/softmax)
      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      # Chunk the [T, V] logits along T to bound forward peak (152K vocab is
      # heavy on L40S). Set to -1 to disable.
      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 128
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 2048

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 4
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1

      mem_fraction_static: 0.2
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 8192
      max_running_requests: 32
      log_level: info

      server_groups:
        - worker_type: regular
          num_gpus: 1

  # ─── selector ─────────────────────────────────────────────────────────────
  - name: selector
    role: actor

    hf_checkpoint: /root/Qwen3-0.6B
    # load: /ckpt/multi_policy_multi_agent/qwen3-0.6b/selector
    save: /ckpt/multi_policy_multi_agent/qwen3-0.6b/selector

    buffer_mode: split

    num_gpus_per_node: 1
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      # RL-correctness defaults (zero dropout, fp32 reductions/softmax)
      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      # Chunk the [T, V] logits along T to bound forward peak (152K vocab is
      # heavy on L40S). Set to -1 to disable.
      log_probs_chunk_size: 512

      micro_batch_size: 1
      global_batch_size: 128
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 2048

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 4     # N parallel selectors per problem (matches num_parallel)
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 1

      mem_fraction_static: 0.2
      cuda_graph_bs: [1, 2, 4, 8, 16, 32]
      chunked_prefill_size: 8192
      max_running_requests: 32
      log_level: info

      server_groups:
        - worker_type: regular
          num_gpus: 1
