        uses: actions/checkout@v4



      - name: Execute
        shell: bash
        run: |

          docker run --rm \
            --privileged \
            --cap-add SYS_NICE \
            --security-opt seccomp=unconfined \
            --network host \
            --gpus all \
            --ipc=host \
            --shm-size=16g \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --memory=0 \
            --memory-swap=0 \
            -e http_proxy \
            -e https_proxy \
